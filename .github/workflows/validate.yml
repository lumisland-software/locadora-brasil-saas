name: Validar e publicar Locadora Brasil

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Obter repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências da raiz
        run: npm ci

      - name: Instalar dependências do bridge sem Chromium
        run: npm --prefix tools/abm-bridge install --ignore-scripts

      - name: Validar JavaScript
        run: npm run check

      - name: Validar scripts PowerShell
        shell: pwsh
        run: |
          $parseErrors = @()
          Get-ChildItem tools/abm-bridge -Filter *.ps1 -File | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors) {
              $parseErrors += $errors | ForEach-Object { "$($_.Extent.File):$($_.Extent.StartLineNumber) $($_.Message)" }
            }
          }
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Validar geração idempotente do seed
        shell: pwsh
        run: |
          $env:WORKSHOP_ID = '00000000-0000-4000-8000-000000000001'
          npm run seed:locadora-teste -- --print-sql | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Obter repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Publicar na Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
